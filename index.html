<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FocusFlow — Productivity Workspace</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>

<style>
/* ════════════════════════════════════
   THEME TOKENS — dark (default)
════════════════════════════════════ */
:root,[data-theme="dark"] {
  --bg:         #05080F;
  --bg2:        #0A0F1E;
  --bg3:        #0F1528;
  --surf:       rgba(255,255,255,0.042);
  --surf2:      rgba(255,255,255,0.075);
  --surf3:      rgba(255,255,255,0.10);
  --bdr:        rgba(255,255,255,0.068);
  --bdr2:       rgba(255,255,255,0.14);
  --bdr3:       rgba(108,99,255,0.35);
  --txt:        #EDF0FF;
  --txt2:       rgba(237,240,255,0.55);
  --txt3:       rgba(237,240,255,0.28);
  --nav-bg:     rgba(5,8,15,0.82);
  --card-bg:    rgba(255,255,255,0.042);
  --card-hi:    rgba(255,255,255,0.075);
  --input-bg:   rgba(255,255,255,0.04);
  --modal-bg:   rgba(0,0,0,0.65);
  --shadow-col: rgba(0,0,0,0.6);
  --grid-col:   rgba(108,99,255,0.04);
  --glow-a:     rgba(108,99,255,0.28);
  --glow-b:     rgba(79,70,229,0.20);
  --glow-c:     rgba(52,211,153,0.14);
  --theme-ico:  "☀";
}
[data-theme="light"] {
  --bg:         #EEF1FB;
  --bg2:        #E8ECF8;
  --bg3:        #E0E5F5;
  --surf:       rgba(255,255,255,0.70);
  --surf2:      rgba(255,255,255,0.85);
  --surf3:      rgba(255,255,255,0.95);
  --bdr:        rgba(90,90,150,0.10);
  --bdr2:       rgba(90,90,150,0.18);
  --bdr3:       rgba(108,99,255,0.40);
  --txt:        #1A1C2E;
  --txt2:       rgba(26,28,46,0.60);
  --txt3:       rgba(26,28,46,0.36);
  --nav-bg:     rgba(235,238,252,0.88);
  --card-bg:    rgba(255,255,255,0.70);
  --card-hi:    rgba(255,255,255,0.90);
  --input-bg:   rgba(255,255,255,0.80);
  --modal-bg:   rgba(20,20,50,0.45);
  --shadow-col: rgba(90,100,180,0.15);
  --grid-col:   rgba(108,99,255,0.06);
  --glow-a:     rgba(108,99,255,0.14);
  --glow-b:     rgba(79,70,229,0.10);
  --glow-c:     rgba(52,211,153,0.10);
  --theme-ico:  "🌙";
}

/* ── CONSTANTS ── */
:root {
  --acc:   #6C63FF;
  --acc2:  #9B95FF;
  --acc3:  #4A43D4;
  --red:   #F87171;
  --yel:   #FBBF24;
  --grn:   #34D399;
  --r:     16px;
  --r-sm:  10px;
  --ease:  cubic-bezier(0.23,1,0.32,1);
  --eio:   cubic-bezier(0.4,0,0.2,1);
}

/* ── THEME TRANSITION ── */
*, *::before, *::after {
  box-sizing: border-box; margin:0; padding:0;
  transition: background-color 0.35s var(--ease),
              border-color 0.35s var(--ease),
              color 0.25s var(--ease),
              box-shadow 0.25s var(--ease);
}
/* Don't transition transforms (causes jank) */
.no-theme-transition, .card-3d, .tcard, .scard, .btn {
  transition: transform 0.15s var(--ease),
              box-shadow 0.18s var(--ease),
              opacity 0.2s var(--ease),
              background-color 0.35s var(--ease),
              border-color 0.35s var(--ease),
              color 0.25s var(--ease) !important;
}

html, body { width:100%; height:100%; overflow:hidden; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--txt);
  -webkit-font-smoothing: antialiased;
}
#root { width:100%; height:100%; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.3); border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(108,99,255,0.55); }

/* ════════════════════════════════════
   AMBIENT SCENE — subtle, atmospheric
════════════════════════════════════ */
#scene {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  overflow:hidden;
}
/* 3D perspective grid floor */
.grid-floor {
  position:absolute; inset:0;
  background-image:
    linear-gradient(var(--grid-col) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-col) 1px, transparent 1px);
  background-size: 60px 60px;
  transform: perspective(700px) rotateX(58deg) scale(2.8) translateY(18%);
  transform-origin: 50% 100%;
  mask-image: radial-gradient(ellipse 90% 55% at 50% 100%, black 0%, transparent 80%);
  animation: gridPulse 10s ease-in-out infinite;
}
@keyframes gridPulse{ 0%,100%{opacity:0.45} 50%{opacity:1} }

/* Ambient glow blobs — 3D parallax on mouse */
.gblob {
  position:absolute; border-radius:50%;
  filter:blur(90px); pointer-events:none;
  animation: blobFloat ease-in-out infinite;
  will-change: transform, opacity;
}
@keyframes blobFloat {
  0%,100%{ transform:translateY(0px)   scale(1);   opacity:var(--op,0.2); }
  33%    { transform:translateY(-20px) scale(1.06);opacity:calc(var(--op,0.2)*1.3); }
  66%    { transform:translateY(8px)   scale(0.96);opacity:calc(var(--op,0.2)*0.8); }
}
/* Floating orbs — real 3D perspective depth */
.orb {
  position:absolute; border-radius:50%;
  pointer-events:none;
  animation: orbFloat linear infinite;
  transform-style: preserve-3d;
  will-change: transform;
}
@keyframes orbFloat {
  0%   { transform: perspective(600px) translateZ(-180px) translateY(0px)   rotateY(0deg); }
  25%  { transform: perspective(600px) translateZ(-90px)  translateY(-25px) rotateY(90deg); }
  50%  { transform: perspective(600px) translateZ(-180px) translateY(-45px) rotateY(180deg); }
  75%  { transform: perspective(600px) translateZ(-260px) translateY(-20px) rotateY(270deg); }
  100% { transform: perspective(600px) translateZ(-180px) translateY(0px)   rotateY(360deg); }
}
/* Thin geometric wireframes */
.wire {
  position:absolute; border:1px solid rgba(108,99,255,0.12);
  pointer-events:none;
  animation: wireFloat linear infinite;
  transform-style: preserve-3d;
}
.wire-cube { border-radius:4px; }
.wire-ring { border-radius:50%; }
@keyframes wireFloat {
  0%  { transform:perspective(500px) rotateX(0deg)   rotateY(0deg)   rotateZ(0deg)   translateZ(-100px); opacity:0.08; }
  50% { transform:perspective(500px) rotateX(180deg) rotateY(360deg) rotateZ(90deg)  translateZ(-60px);  opacity:0.18; }
  100%{ transform:perspective(500px) rotateX(360deg) rotateY(720deg) rotateZ(180deg) translateZ(-100px); opacity:0.08; }
}
/* Cursor light */
#cursor-light {
  position:fixed; pointer-events:none; z-index:1;
  width:600px; height:600px; border-radius:50%;
  background: radial-gradient(circle, rgba(108,99,255,0.07) 0%, transparent 68%);
  transform: translate(-50%,-50%);
  will-change: transform;
}

/* ════════════════════════════════════
   NAVBAR
════════════════════════════════════ */
.navbar {
  position:fixed; top:0; left:0; right:0; z-index:100; height:62px;
  display:flex; align-items:center; justify-content:space-between; padding:0 28px;
  background: var(--nav-bg);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border-bottom: 1px solid var(--bdr);
  box-shadow: 0 1px 0 rgba(108,99,255,0.06), 0 4px 20px var(--shadow-col);
}

/* ════════════════════════════════════
   GLASS CARDS — two tiers
════════════════════════════════════ */
.glass {
  background: var(--card-bg);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  position:relative; overflow:hidden;
}
.glass::before {
  content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 55%);
}
.glass-hi {
  background: var(--card-hi);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border: 1px solid var(--bdr2);
  border-radius: var(--r);
  position:relative; overflow:hidden;
  box-shadow: 0 24px 64px var(--shadow-col), 0 0 0 1px rgba(108,99,255,0.10);
}
.glass-hi::before {
  content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background: linear-gradient(130deg, rgba(255,255,255,0.10) 0%, transparent 50%);
}
/* Light streak sweep on hover */
.glass-hi::after {
  content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.06) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.7s var(--ease) !important;
}
.glass-hi:hover::after { transform: translateX(100%); }

/* ════════════════════════════════════
   3D CARD TILT (JS-driven)
════════════════════════════════════ */
.card-3d {
  transform-style: preserve-3d;
  will-change: transform;
  transition: transform 0.12s var(--ease), box-shadow 0.15s var(--ease) !important;
}
.card-3d-slow {
  transform-style: preserve-3d;
  will-change: transform;
  transition: transform 0.5s var(--ease), box-shadow 0.4s var(--ease) !important;
}

/* ════════════════════════════════════
   TASK CARDS
════════════════════════════════════ */
.tcard {
  background: var(--card-bg);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  padding: 14px 16px;
  display:flex; align-items:flex-start; gap:12px;
  position:relative; overflow:hidden;
  transform-style: preserve-3d;
  will-change: transform;
  cursor: default;
}
.tcard::before {
  content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
}
.tcard.done  { opacity:0.38; }
.tcard.done .ttitle { text-decoration:line-through; color:var(--txt3); }
.tcard.focused-card { border-color:var(--bdr3); background:rgba(108,99,255,0.06); }
.tacts {
  display:flex; gap:4px;
  opacity:0; transform:translateX(8px);
  flex-shrink:0;
  transition: opacity 0.2s, transform 0.25s var(--ease) !important;
}
.tcard:hover .tacts { opacity:1; transform:translateX(0); }

@keyframes taskDone {
  0%   { transform:perspective(600px) translateZ(0) scale(1) }
  25%  { transform:perspective(600px) translateZ(20px) scale(1.03) rotateY(3deg) }
  60%  { transform:perspective(600px) translateZ(0) scale(0.98) }
  100% { transform:perspective(600px) translateZ(0) scale(1) }
}
.task-completing { animation: taskDone 0.55s var(--ease); }

/* ════════════════════════════════════
   BUTTONS
════════════════════════════════════ */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  padding:10px 18px; border-radius:var(--r-sm); border:none; cursor:pointer;
  font-family:inherit; font-size:13px; font-weight:600;
  letter-spacing:0.1px; position:relative; overflow:hidden; user-select:none;
}
.btn::after {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background: radial-gradient(circle at center, rgba(255,255,255,0.18), transparent 70%);
  transform:scale(0); opacity:0; pointer-events:none;
  transition: transform 0.5s var(--ease), opacity 0.5s !important;
}
.btn:active::after { transform:scale(2.5); opacity:1; transition-duration:0.1s !important; }
.btn:hover  { transform: translateY(-2px) scale(1.02); }
.btn:active { transform: translateY(1px)  scale(0.97) translateZ(-4px); }
.btn:disabled { opacity:0.45; cursor:not-allowed; pointer-events:none; }
.btn-p {
  background: linear-gradient(135deg, var(--acc) 0%, var(--acc3) 100%);
  color: #fff;
  box-shadow: 0 4px 18px rgba(108,99,255,0.40), inset 0 1px 0 rgba(255,255,255,0.14);
}
.btn-p:hover { box-shadow: 0 10px 30px rgba(108,99,255,0.60), inset 0 1px 0 rgba(255,255,255,0.18); }
.btn-g {
  background: var(--surf2); color:var(--txt2); border:1px solid var(--bdr);
}
.btn-g:hover { color:var(--txt); border-color:var(--bdr2); background:var(--surf3); }
.btn-d { background:rgba(248,113,113,0.13); color:var(--red); border:1px solid rgba(248,113,113,0.24); }
.btn-d:hover { background:rgba(248,113,113,0.24); }
.btn-s { background:rgba(52,211,153,0.13); color:var(--grn); border:1px solid rgba(52,211,153,0.24); }
.btn-s:hover { background:rgba(52,211,153,0.24); }
.btn-lg { padding:13px 28px; font-size:14px; border-radius:12px; }
.btn-sm { padding:6px 12px; font-size:12px; border-radius:8px; }
.btn-ic { padding:8px; border-radius:9px; }
.btn-theme {
  background: var(--surf2); color:var(--txt2); border:1px solid var(--bdr);
  padding:8px 12px; border-radius:9px; font-size:16px; line-height:1;
}
.btn-theme:hover { transform:translateY(-2px) rotate(15deg) scale(1.1) !important; }

/* ════════════════════════════════════
   INPUTS
════════════════════════════════════ */
.inp {
  background: var(--input-bg);
  border: 1px solid var(--bdr);
  border-radius: var(--r-sm); color:var(--txt);
  font-family:inherit; font-size:13px;
  padding:11px 14px; width:100%;
  outline:none;
}
.inp:hover:not(:focus) { border-color:var(--bdr2); }
.inp:focus {
  border-color: var(--acc);
  background: rgba(108,99,255,0.07);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.16), 0 4px 16px rgba(108,99,255,0.15);
  transform: translateY(-1px);
}
.inp::placeholder { color:var(--txt3); }
.inp-err { border-color:var(--red)!important; box-shadow:0 0 0 3px rgba(248,113,113,0.15)!important; }
.err-msg { font-size:11.5px; color:var(--red); margin-top:4px; display:flex; align-items:center; gap:4px; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
.shake { animation:shake 0.4s var(--ease); }

/* Custom select option text always black */
select option { color:#000 !important; background:#fff !important; }

/* ════════════════════════════════════
   BADGE + CHIP
════════════════════════════════════ */
.badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 9px; border-radius:6px;
  font-size:10.5px; font-weight:700;
  letter-spacing:0.5px; text-transform:uppercase;
}
.bh{background:rgba(248,113,113,0.14);color:var(--red);border:1px solid rgba(248,113,113,0.26);}
.bm{background:rgba(251,191,36,0.14);color:var(--yel);border:1px solid rgba(251,191,36,0.26);}
.bl{background:rgba(52,211,153,0.14);color:var(--grn);border:1px solid rgba(52,211,153,0.26);}
.chip {
  display:inline-flex; align-items:center; gap:3px;
  padding:3px 9px; border-radius:5px;
  font-size:11px; font-weight:600;
  background:var(--surf2); color:var(--txt3); border:1px solid var(--bdr);
}
/* Pulse dot */
.pdot {
  width:6px; height:6px; border-radius:50%; background:var(--grn); flex-shrink:0;
  animation:pdotA 2s ease-in-out infinite;
}
@keyframes pdotA{ 0%{box-shadow:0 0 0 0 rgba(52,211,153,0.55)} 70%{box-shadow:0 0 0 7px rgba(52,211,153,0)} 100%{box-shadow:0 0 0 0 rgba(52,211,153,0)} }

/* ════════════════════════════════════
   PROGRESS BAR
════════════════════════════════════ */
.ptrack { height:5px; background:rgba(108,99,255,0.10); border-radius:3px; overflow:hidden; }
.pfill  {
  height:100%; border-radius:3px;
  background: linear-gradient(90deg, var(--acc3), var(--acc2));
  transition: width 1s var(--ease) !important;
  box-shadow: 0 0 12px rgba(108,99,255,0.5);
}

/* ════════════════════════════════════
   TIMER DISPLAY
════════════════════════════════════ */
.tdisp {
  font-family: 'JetBrains Mono', monospace;
  font-size: 72px; font-weight:700; letter-spacing:-3px; line-height:1;
  background: linear-gradient(135deg,var(--txt) 20%, var(--acc2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ════════════════════════════════════
   TIMER PRESET SELECTOR
════════════════════════════════════ */
.timer-preset {
  display:flex; align-items:center; justify-content:center;
  padding:8px 16px; border-radius:10px;
  font-size:13px; font-weight:700;
  border:2px solid var(--bdr2); cursor:pointer;
  background:var(--surf); color:var(--txt2);
  transition:all 0.2s var(--ease) !important;
  min-width:60px;
}
.timer-preset:hover { border-color:var(--acc); color:var(--txt); transform:translateY(-2px) scale(1.04); }
.timer-preset.active {
  border-color:var(--acc); color:var(--txt);
  background:rgba(108,99,255,0.14);
  box-shadow:0 0 0 1px rgba(108,99,255,0.3), 0 4px 14px rgba(108,99,255,0.2);
}

/* ════════════════════════════════════
   PRIORITY CUSTOM DROPDOWN
════════════════════════════════════ */
.prio-drop {
  position:relative; user-select:none;
}
.prio-trigger {
  display:flex; align-items:center; gap:8px;
  padding:11px 14px; border-radius:var(--r-sm);
  border:1px solid var(--bdr);
  background:var(--input-bg); cursor:pointer;
  color:var(--txt); font-size:13px; font-weight:600;
  transition:all 0.2s var(--ease) !important;
  width:130px;
}
.prio-trigger:hover { border-color:var(--bdr2); }
.prio-trigger.open  { border-color:var(--acc); box-shadow:0 0 0 3px rgba(108,99,255,0.16); }
.prio-menu {
  position:absolute; top:calc(100% + 6px); left:0; right:0;
  background:var(--bg3); border:1px solid var(--bdr2);
  border-radius:var(--r-sm); z-index:50; overflow:hidden;
  box-shadow:0 16px 40px var(--shadow-col);
  animation:dropIn 0.2s var(--ease);
}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.prio-opt {
  display:flex; align-items:center; gap:8px;
  padding:10px 14px; cursor:pointer; font-size:13px; font-weight:600;
  color:#000; background:#fff;
  transition:background 0.15s !important;
}
[data-theme="dark"] .prio-opt { color:#fff; background:transparent; }
[data-theme="dark"] .prio-opt:hover { background:rgba(108,99,255,0.12); }
[data-theme="light"] .prio-opt:hover { background:rgba(108,99,255,0.08); }
.prio-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* ════════════════════════════════════
   STAT CARD
════════════════════════════════════ */
.scard {
  background:var(--card-bg); border:1px solid var(--bdr);
  border-radius:var(--r); padding:22px;
  display:flex; flex-direction:column; gap:6px;
  position:relative; overflow:hidden; cursor:default;
  transform-style:preserve-3d; will-change:transform;
}
.scard::after {
  content:''; position:absolute; bottom:-20px; right:-20px;
  width:70px; height:70px; border-radius:50%;
  background:radial-gradient(circle,rgba(108,99,255,0.12),transparent); pointer-events:none;
}

/* ════════════════════════════════════
   NAV BUTTONS
════════════════════════════════════ */
.nav-btn {
  display:flex; align-items:center; gap:5px;
  padding:7px 14px; border-radius:9px;
  font-size:13px; font-weight:600; color:var(--txt2);
  cursor:pointer; border:1px solid transparent;
  background:none; font-family:inherit; letter-spacing:0.1px;
  transition:all 0.2s var(--ease) !important;
}
.nav-btn:hover { color:var(--txt); background:var(--surf2); }
.nav-btn.act  {
  color:var(--acc2); background:rgba(108,99,255,0.13);
  border-color:rgba(108,99,255,0.26);
  box-shadow:0 2px 12px rgba(108,99,255,0.16);
}
.nav-count {
  background:var(--acc); color:#fff; font-size:10px; font-weight:700;
  border-radius:20px; padding:1px 6px; min-width:18px; text-align:center;
  animation:popIn 0.3s var(--ease);
}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.avatar {
  width:34px; height:34px; border-radius:50%; cursor:pointer;
  background:linear-gradient(135deg,var(--acc),#8B5CF6);
  display:flex; align-items:center; justify-content:center;

}
.avatar:hover { transform:scale(1.12) rotateY(20deg); box-shadow:0 8px 22px rgba(108,99,255,0.55); }

/* ════════════════════════════════════
   MODAL + TOAST
════════════════════════════════════ */
.overlay {
  position:fixed; inset:0; z-index:300;
  background:var(--modal-bg); backdrop-filter:blur(12px);
  display:flex; align-items:center; justify-content:center;
  animation:fadeIn 0.2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-in { animation:modalPop 0.32s var(--ease); }
@keyframes modalPop{from{opacity:0;transform:scale(0.88) translateY(16px) translateZ(-40px)}to{opacity:1;transform:scale(1) translateY(0) translateZ(0)}}
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%);
  background:rgba(10,14,30,0.92); backdrop-filter:blur(20px);
  border:1px solid rgba(108,99,255,0.38); border-radius:100px;
  padding:10px 22px; font-size:13px; font-weight:600; color:var(--txt);
  z-index:400; box-shadow:0 8px 32px rgba(0,0,0,0.5);
  animation:toastUp 0.35s var(--ease); white-space:nowrap;
}
[data-theme="light"] .toast { background:rgba(240,244,255,0.96); }
@keyframes toastUp{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ════════════════════════════════════
   DISTRACTION-FREE FOCUS MODE
════════════════════════════════════ */
.dist-full {
  position:fixed; inset:0; z-index:200;
  display:flex; align-items:center; justify-content:center;
  background:#030508;
  animation:distEnter 0.6s var(--ease) forwards;
}
@keyframes distEnter{from{opacity:0;transform:scale(1.04)}to{opacity:1;transform:scale(1)}}
/* Animated gradient bg */
@keyframes distBg{
  0%  {background:radial-gradient(ellipse at 28% 28%,rgba(108,99,255,0.16) 0%,#030508 62%)}
  33% {background:radial-gradient(ellipse at 72% 22%,rgba(79,70,229,0.16)  0%,#030508 62%)}
  66% {background:radial-gradient(ellipse at 65% 78%,rgba(139,133,255,0.14) 0%,#030508 62%)}
  100%{background:radial-gradient(ellipse at 28% 28%,rgba(108,99,255,0.16) 0%,#030508 62%)}
}
.dist-bg { position:absolute; inset:0; animation:distBg 18s ease-in-out infinite; }
/* Particles */
.fp {
  position:absolute; border-radius:50%; pointer-events:none;
  background:rgba(108,99,255,0.7);
  animation:fpDrift linear infinite;
}
@keyframes fpDrift{
  0%  {transform:translateY(0) translateX(0);        opacity:0}
  12% {opacity:0.8}
  88% {opacity:0.6}
  100%{transform:translateY(-240px) translateX(var(--dx,0)); opacity:0}
}
/* Breathing animation for focus content */
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.022)}}
.breathe{animation:breathe 4.5s ease-in-out infinite;}

/* ════════════════════════════════════
   SVG ARC ANIMATIONS
════════════════════════════════════ */
@keyframes arcGlow{
  0%,100%{filter:drop-shadow(0 0 6px rgba(108,99,255,0.8))}
  50%    {filter:drop-shadow(0 0 18px rgba(155,149,255,1.0))}
}
.arc-running{animation:arcGlow 2s ease-in-out infinite;}
@keyframes burst{0%{transform:scale(1);opacity:0.8}100%{transform:scale(2.8);opacity:0}}
.burst{position:absolute;inset:0;border-radius:50%;border:2px solid var(--grn);animation:burst 0.8s var(--ease) forwards;pointer-events:none;}
/* Rotating ring */
@keyframes rwCW {from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes rwCCW{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}

/* ════════════════════════════════════
   PAGE TRANSITIONS
════════════════════════════════════ */
.pg{animation:pageIn 0.45s var(--ease) forwards; transform-origin:50% 0%;}
@keyframes pageIn{from{opacity:0;transform:perspective(1200px) translateZ(-60px) translateY(16px) scale(0.98)}to{opacity:1;transform:perspective(1200px) translateZ(0) translateY(0) scale(1)}}

/* ════════════════════════════════════
   STAGGER ENTRANCE
════════════════════════════════════ */
.stagger>*{animation:stgIn 0.4s var(--ease) both;}
@keyframes stgIn{from{opacity:0;transform:translateY(10px) translateZ(-20px)}to{opacity:1;transform:translateY(0) translateZ(0)}}
.stagger>*:nth-child(1) {animation-delay:.05s}
.stagger>*:nth-child(2) {animation-delay:.10s}
.stagger>*:nth-child(3) {animation-delay:.15s}
.stagger>*:nth-child(4) {animation-delay:.20s}
.stagger>*:nth-child(5) {animation-delay:.24s}
.stagger>*:nth-child(6) {animation-delay:.27s}
.stagger>*:nth-child(n+7){animation-delay:.30s}

/* Soft float */
@keyframes softFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.soft-float{animation:softFloat 5s ease-in-out infinite;}

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── STORAGE ── */
const S = {
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
const uid = ()=>Math.random().toString(36).slice(2,9);
const EMAIL = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
const PO={High:0,Medium:1,Low:2};
const PC={High:'var(--red)',Medium:'var(--yel)',Low:'var(--grn)'};
const PB={High:'bh',Medium:'bm',Low:'bl'};
const PD={High:'#F87171',Medium:'#FBBF24',Low:'#34D399'};
const TIMER_PRESETS=[5,10,15,20,25,30,45,60];

/* ── CURSOR LIGHT ── */
const initCursorLight=()=>{
  const el=document.getElementById('cursor-light');
  if(!el)return;
  window.addEventListener('mousemove',e=>{
    el.style.transform=`translate(calc(${e.clientX}px - 50%), calc(${e.clientY}px - 50%))`;
  },{passive:true});
};

/* ── 3D TILT HOOK ── */
function useTilt(strength=12){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current; if(!el)return;
    const onMove=e=>{
      const r=el.getBoundingClientRect();
      const dx=(e.clientX-r.left-r.width/2)/(r.width/2);
      const dy=(e.clientY-r.top-r.height/2)/(r.height/2);
      el.style.transform=`perspective(900px) rotateX(${-dy*strength}deg) rotateY(${dx*strength}deg) translateZ(${strength*0.8}px)`;
      el.style.boxShadow=`${dx*-12}px ${dy*12}px 50px rgba(0,0,0,0.6), 0 0 30px rgba(108,99,255,${0.08+Math.abs(dx)*0.08})`;
    };
    const onLeave=()=>{
      el.style.transform='perspective(900px) rotateX(0) rotateY(0) translateZ(0)';
      el.style.boxShadow='';
    };
    el.addEventListener('mousemove',onMove);
    el.addEventListener('mouseleave',onLeave);
    return()=>{el.removeEventListener('mousemove',onMove);el.removeEventListener('mouseleave',onLeave);};
  },[strength]);
  return ref;
}

/* ── PARALLAX MOUSE HOOK ── */
function useParallax(){
  const [pos,setPos]=useState({x:0,y:0});
  useEffect(()=>{
    const move=e=>{
      setPos({x:(e.clientX/window.innerWidth-0.5),y:(e.clientY/window.innerHeight-0.5)});
    };
    window.addEventListener('mousemove',move,{passive:true});
    return()=>window.removeEventListener('mousemove',move);
  },[]);
  return pos;
}

};

/* ── PRIORITY DROPDOWN ── */
function PriorityDrop({value,onChange}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const outside=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',outside);
    return()=>document.removeEventListener('mousedown',outside);
  },[]);
  const opts=[{v:'High',label:'🔴 High',dot:PD.High},{v:'Medium',label:'🟡 Medium',dot:PD.Medium},{v:'Low',label:'🟢 Low',dot:PD.Low}];
  const cur=opts.find(o=>o.v===value)||opts[1];
  return(
    <div className="prio-drop" ref={ref} style={{flexShrink:0}}>
      <div className={`prio-trigger${open?' open':''}`} onClick={()=>setOpen(o=>!o)}>
        <span style={{width:8,height:8,borderRadius:'50%',background:cur.dot,display:'inline-block',flexShrink:0}}/>
        <span style={{flex:1}}>{cur.v}</span>
        <Ic d={I.chevD} size={12} style={{transition:'transform 0.2s',transform:open?'rotate(180deg)':'rotate(0)'}}/>
      </div>
      {open&&(
        <div className="prio-menu">
          {opts.map(o=>(
            <div key={o.v} className="prio-opt" onClick={()=>{onChange(o.v);setOpen(false);}}>
              <span className="prio-dot" style={{background:o.dot}}/>
              {o.label}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── TOAST ── */

function Confirm({title,body,onOk,onCancel,okLabel='Delete',okCls='btn-d'}){

/* ══════════════════════════════════════════
   LOGIN PAGE — full 3D tilt card
══════════════════════════════════════════ */
function LoginPage({onLogin,theme,toggleTheme}){
  const [mode,setMode]=useState('login');
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [showPw,setShowPw]=useState(false);
  const [errors,setErrors]=useState({});
  const [loading,setLoading]=useState(false);
  const [shaking,setShaking]=useState(false);
  const tiltRef=useTilt(10);

  const validate=()=>{
    const e={};
    if(mode==='signup'&&!name.trim())e.name='Name is required';
    if(!email.trim())e.email='Email is required';
    else if(!EMAIL.test(email))e.email='Enter a valid email';
    if(!pw)e.pw='Password is required';
    else if(pw.length<6)e.pw='At least 6 characters required';
    return e;
  };
  const submit=()=>{
    const e=validate();setErrors(e);
    if(Object.keys(e).length){setShaking(true);setTimeout(()=>setShaking(false),400);return;}
    setLoading(true);
    setTimeout(()=>{
      const users=S.get('ff_users',{});
      if(mode==='signup'){
        if(users[email]){setErrors({email:'Account already exists'});setLoading(false);return;}
        users[email]={name:name.trim(),password:pw,joined:new Date().toLocaleDateString()};
        S.set('ff_users',users);S.set('ff_user',{email,name:name.trim()});
        onLogin({email,name:name.trim()});
      }else{
        if(!users[email]||users[email].password!==pw){
          setErrors({pw:'Incorrect email or password'});setLoading(false);
          setShaking(true);setTimeout(()=>setShaking(false),400);return;
        }
        S.set('ff_user',{email,name:users[email].name});
        onLogin({email,name:users[email].name});
      }
    },650);
  };

  return(
    <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',padding:20,zIndex:10}}>
      {/* Theme toggle on login */}
      <button className="btn btn-theme" onClick={toggleTheme}

        {theme==='dark'?'☀':'🌙'}
      </button>
      {/* Decorative rings */}
      <div style={{position:'fixed',width:700,height:700,borderRadius:'50%',border:'1px solid rgba(108,99,255,0.09)',top:'50%',left:'50%',transform:'translate(-50%,-50%)',pointerEvents:'none',animation:'rwCW 30s linear infinite'}}/>
      <div style={{position:'fixed',width:480,height:480,borderRadius:'50%',border:'1px solid rgba(108,99,255,0.06)',top:'50%',left:'50%',transform:'translate(-50%,-50%)',pointerEvents:'none',animation:'rwCCW 20s linear infinite'}}/>

      <div ref={tiltRef} className={`glass-hi card-3d${shaking?' shake':''}`}
        style={{width:'100%',maxWidth:420,padding:40}}>
        {/* Logo */}
        <div style={{textAlign:'center',marginBottom:30}}>
          <div style={{width:58,height:58,borderRadius:18,margin:'0 auto 14px',
            background:'linear-gradient(135deg,var(--acc),var(--acc3))',
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:'0 10px 30px rgba(108,99,255,0.55)',
            animation:'softFloat 4s ease-in-out infinite'}}>
            <Ic d={I.zap} size={26}/>
          </div>
          <div style={{fontSize:26,fontWeight:800,letterSpacing:'-0.5px',marginBottom:3}}>FocusFlow</div>
          <div style={{fontSize:10,color:'var(--txt3)',letterSpacing:'2px',textTransform:'uppercase',fontWeight:600}}>By Hassan &amp; Sami</div>
          <div style={{fontSize:13,color:'var(--txt2)',marginTop:10}}>{mode==='login'?'Sign in to your workspace':'Create your account'}</div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {mode==='signup'&&(
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              <label htmlFor="nm" style={{fontSize:11.5,fontWeight:700,color:'var(--txt2)',textTransform:'uppercase',letterSpacing:'0.8px'}}>Full Name</label>
              <input id="nm" className={`inp${errors.name?' inp-err':''}`} type="text" value={name}
                placeholder="Your full name"
                onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
              {errors.name&&<div className="err-msg">⚠ {errors.name}</div>}
            </div>
          )}
          <AuthField label="Email" id="email" type="email" value={email} onChange={setEmail} error={errors.email} onEnter={submit}/>
          <AuthField label="Password" id="password" type={showPw?'text':'password'} value={pw} onChange={setPw} error={errors.pw} onEnter={submit} showToggle showPw={showPw} onToggle={()=>setShowPw(p=>!p)}/>
          <button className="btn btn-p btn-lg" onClick={submit} disabled={loading}
            style={{marginTop:4,width:'100%',justifyContent:'center',fontSize:14}}>
            {loading?'⏳ Please wait…':mode==='login'?'Sign In →':'Create Account ✦'}
          </button>
          <p style={{textAlign:'center',fontSize:13,color:'var(--txt3)'}}>
            {mode==='login'?'New here? ':'Have an account? '}

              {mode==='login'?'Create account':'Sign in'}

          </p>
          <p style={{textAlign:'center',fontSize:11,color:'var(--txt3)'}}>Demo: any email + 6+ char password</p>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   TASK CARD ITEM
══════════════════════════════════════════ */
function TaskItem({task,onToggle,onDelete,onEdit,onFocus,isFocused}){
  const [confirm,setConfirm]=useState(false);
  const [editing,setEditing]=useState(false);
  const [editVal,setEditVal]=useState(task.title);
  const [completing,setCompleting]=useState(false);
  const cardRef=useRef(null);
  const editRef=useRef(null);
  useEffect(()=>{if(editing&&editRef.current)editRef.current.focus();},[editing]);

  /* Per-card 3D tilt */
  useEffect(()=>{
    const el=cardRef.current;if(!el)return;
    const onMove=e=>{
      const r=el.getBoundingClientRect();
      const dx=(e.clientX-r.left-r.width/2)/(r.width/2);
      const dy=(e.clientY-r.top-r.height/2)/(r.height/2);
      el.style.transform=`perspective(700px) rotateX(${-dy*5}deg) rotateY(${dx*7}deg) translateZ(10px) scale(1.018)`;
      el.style.boxShadow=`${dx*-10}px ${dy*8}px 36px rgba(0,0,0,0.55), 0 0 24px rgba(108,99,255,0.10)`;
      el.style.borderColor=isFocused?'rgba(108,99,255,0.55)':'rgba(255,255,255,0.16)';
    };
    const onLeave=()=>{
      el.style.transform='perspective(700px) rotateX(0) rotateY(0) translateZ(0) scale(1)';
      el.style.boxShadow='';
      el.style.borderColor='';
    };
    el.addEventListener('mousemove',onMove);
    el.addEventListener('mouseleave',onLeave);
    return()=>{el.removeEventListener('mousemove',onMove);el.removeEventListener('mouseleave',onLeave);};
  },[isFocused]);

  const handleToggle=()=>{
    if(!task.done){
      setCompleting(true);
      setTimeout(()=>{setCompleting(false);onToggle(task.id);},500);
    }else onToggle(task.id);
  };

  const color=PC[task.priority];
  return(
    <>
      <div ref={cardRef} className={`tcard${task.done?' done':''}${isFocused?' focused-card':''}${completing?' task-completing':''}`}
        style={{borderLeft:`3px solid ${color}`,transition:'transform 0.12s var(--ease), box-shadow 0.15s, border-color 0.2s, opacity 0.35s'}}>
        {/* Checkbox */}
        <button style={{width:22,height:22,borderRadius:6,padding:0,flexShrink:0,marginTop:2,
          border:`2px solid ${task.done?'var(--acc)':'var(--bdr2)'}`,
          background:task.done?'var(--acc)':'transparent',cursor:'pointer',
          display:'flex',alignItems:'center',justifyContent:'center',
          transition:'all 0.22s var(--ease)',boxShadow:task.done?'0 0 12px rgba(108,99,255,0.45)':''}}
          onClick={handleToggle}>
          {task.done&&<Ic d={I.check} size={11}/>}
        </button>
        {/* Content */}
        <div style={{flex:1,minWidth:0}}>
          {editing?(
            <input ref={editRef} value={editVal}
              style={{background:'transparent',border:'none',borderBottom:'1px solid var(--acc)',
                color:'var(--txt)',fontFamily:'inherit',fontSize:13,fontWeight:600,width:'100%',outline:'none',padding:'2px 0'}}
              onChange={e=>setEditVal(e.target.value)}
              onBlur={()=>{if(editVal.trim())onEdit(task.id,editVal.trim());setEditing(false);}}
              onKeyDown={e=>{if(e.key==='Enter'&&editVal.trim()){onEdit(task.id,editVal.trim());setEditing(false);}if(e.key==='Escape')setEditing(false);}}/>
          ):(
            <div className="ttitle" style={{fontSize:13,fontWeight:600,color:task.done?'var(--txt3)':'var(--txt)',lineHeight:1.45}}>
              {task.title}
            </div>
          )}
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:7,flexWrap:'wrap'}}>
            <span className={`badge ${PB[task.priority]}`}>
              <span style={{width:5,height:5,borderRadius:'50%',background:color,display:'inline-block'}}/>
              {task.priority}
            </span>
            {isFocused&&<span className="chip"><span className="pdot"/>&nbsp;In Focus</span>}
            <span className="chip">{new Date(task.created).toLocaleDateString(undefined,{month:'short',day:'numeric'})}</span>
          </div>
        </div>
        {/* Actions */}
        <div className="tacts">
          <button className="btn btn-g btn-ic btn-sm" onClick={()=>onFocus(task.id)} title="Focus"
            style={{color:isFocused?'var(--acc2)':'var(--txt3)',background:isFocused?'rgba(108,99,255,0.15)':''}}>
            <Ic d={I.target} size={13}/>
          </button>
          <button className="btn btn-g btn-ic btn-sm" onClick={()=>setEditing(true)} title="Edit">
            <Ic d={I.edit} size={13}/>
          </button>
          <button className="btn btn-d btn-ic btn-sm" onClick={()=>setConfirm(true)} title="Delete">
            <Ic d={I.trash} size={13}/>
          </button>
        </div>
      </div>
      {confirm&&<Confirm title="Delete this task?" body={`"${task.title}" will be permanently removed.`}
        onOk={()=>{onDelete(task.id);setConfirm(false);}} onCancel={()=>setConfirm(false)}/>}
    </>
  );
}

/* ── STAT CARD 3D ── */
function StatCard({s}){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const onMove=e=>{
      const r=el.getBoundingClientRect();
      const dx=(e.clientX-r.left-r.width/2)/(r.width/2);
      const dy=(e.clientY-r.top-r.height/2)/(r.height/2);
      el.style.transform=`perspective(500px) rotateX(${-dy*11}deg) rotateY(${dx*11}deg) translateZ(14px) scale(1.04)`;
      el.style.boxShadow=`0 20px 50px rgba(0,0,0,0.65), ${dx*-8}px ${dy*8}px 24px ${s.color}22`;
    };
    const onLeave=()=>{el.style.transform='perspective(500px) rotateX(0) rotateY(0) translateZ(0) scale(1)';el.style.boxShadow='';};
    el.addEventListener('mousemove',onMove);el.addEventListener('mouseleave',onLeave);
    return()=>{el.removeEventListener('mousemove',onMove);el.removeEventListener('mouseleave',onLeave);};

    <div ref={ref} className="scard" style={{cursor:'default',transition:'transform 0.12s var(--ease),box-shadow 0.15s'}}>

/* ══════════════════════════════════════════
   FOCUS PAGE — user timer + cinematic mode
══════════════════════════════════════════ */
function FocusPage({tasks,setTasks,focusedId,setFocusedId,showToast}){
  const incomplete=useMemo(()=>tasks.filter(t=>!t.done).sort((a,b)=>PO[a.priority]-PO[b.priority]),[tasks]);
  const [selId,setSelId]=useState(focusedId||(incomplete[0]?.id||null));
  const [customMin,setCustomMin]=useState(25);
  const [selectedPreset,setSelectedPreset]=useState(25);
  const [showCustom,setShowCustom]=useState(false);
  const [customInput,setCustomInput]=useState('25');
  const TOTAL=selectedPreset*60;
  const [time,setTime]=useState(TOTAL);
  const [running,setRunning]=useState(false);
  const [distract,setDistract]=useState(false);
  const [justDone,setJustDone]=useState(false);
  const iRef=useRef(null);
  const timerRef=useTilt(7);

  const R=88, CIRC=2*Math.PI*R;
  const pct=time/TOTAL;
  const task=tasks.find(t=>t.id===selId)||null;
  const progColor=time===0?'var(--grn)':running?'var(--acc)':'var(--acc2)';

  // Reset timer when preset changes
  useEffect(()=>{setTime(selectedPreset*60);setRunning(false);setDistract(false);},[selectedPreset]);
  useEffect(()=>{setTime(TOTAL);setRunning(false);setDistract(false);},[selId]);

  useEffect(()=>{
    if(running){
      iRef.current=setInterval(()=>{
        setTime(t=>{
          if(t<=1){clearInterval(iRef.current);setRunning(false);setDistract(false);setJustDone(true);showToast('⏰ Session complete! Great focus!','success');setTimeout(()=>setJustDone(false),2000);return 0;}
          return t-1;
        });
      },1000);
    }else clearInterval(iRef.current);
    return()=>clearInterval(iRef.current);
  },[running]);

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const markDone=()=>{
    if(!selId)return;
    setTasks(p=>p.map(t=>t.id===selId?{...t,done:true}:t));
    setFocusedId(null);setRunning(false);setTime(TOTAL);setDistract(false);
    showToast('🎉 Task complete!','success');
    const next=incomplete.find(t=>t.id!==selId);
    setSelId(next?.id||null);
  };
  const setPreset=v=>{setSelectedPreset(v);setShowCustom(false);};
  const applyCustom=()=>{
    const v=parseInt(customInput,10);
    if(!isNaN(v)&&v>=1&&v<=180){setSelectedPreset(v);setShowCustom(false);}
  };

  const color=task?PC[task.priority]:'var(--acc)';

  /* DISTRACTION-FREE MODE */
  if(distract)return(
    <div className="dist-full">
      <div className="dist-bg"/>
      {/* Particles */}
      {[...Array(8)].map((_,i)=>(
        <div key={i} className="fp" style={{
          width:`${2+i*0.5}px`,height:`${2+i*0.5}px`,
          left:`${15+i*10}%`,bottom:`${8+i*4}%`,
          '--dx':`${(i%2===0?1:-1)*(15+i*10)}px`,
          animationDuration:`${3.5+i*1.2}s`,animationDelay:`${i*0.7}s`,opacity:0.6
        }}/>
      ))}
      {/* Outer decorative rings */}
      <div style={{position:'absolute',width:500,height:500,borderRadius:'50%',border:'1px solid rgba(108,99,255,0.14)',top:'50%',left:'50%',transform:'translate(-50%,-50%)',animation:'rwCW 28s linear infinite',pointerEvents:'none'}}/>
      <div style={{position:'absolute',width:350,height:350,borderRadius:'50%',border:'1px solid rgba(108,99,255,0.08)',top:'50%',left:'50%',transform:'translate(-50%,-50%)',animation:'rwCCW 18s linear infinite',pointerEvents:'none'}}/>

      <div className="breathe" style={{textAlign:'center',padding:40,maxWidth:540,position:'relative',zIndex:1}}>
        <div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,0.20)',letterSpacing:'4px',textTransform:'uppercase',marginBottom:16}}>Deep Focus Mode</div>
        {task&&(
          <>
            <div style={{fontSize:20,fontWeight:700,color:'rgba(255,255,255,0.88)',marginBottom:6,lineHeight:1.4}}>{task.title}</div>
            <span className={`badge ${PB[task.priority]}`} style={{marginBottom:28,display:'inline-flex'}}>{task.priority} Priority</span>
          </>
        )}
        {/* Timer ring */}
        <div style={{position:'relative',display:'inline-block',margin:'16px auto 28px'}}>
          {/* Breathing rings */}
          <div style={{position:'absolute',inset:-24,borderRadius:'50%',border:`1px solid ${color}28`,animation:'rwCW 20s linear infinite'}}/>
          <div style={{position:'absolute',inset:-14,borderRadius:'50%',border:`1px solid ${color}18`,animation:'rwCCW 15s linear infinite'}}/>
          <div style={{position:'absolute',inset:-36,borderRadius:'50%',border:`1px solid rgba(108,99,255,0.08)`,animation:'rwCW 35s linear infinite'}}/>
          <svg width="220" height="220" viewBox="0 0 220 220">
            <circle cx="110" cy="110" r={R} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="10"/>
            <circle cx="110" cy="110" r={R} fill="none" stroke={progColor} strokeWidth="10"
              strokeLinecap="round" strokeDasharray={CIRC} strokeDashoffset={CIRC*(1-pct)}
              transform="rotate(-90 110 110)" className={running?'arc-running':''}
              style={{transition:'stroke-dashoffset 1s linear, stroke 0.4s'}}/>
          </svg>
          {justDone&&<div className="burst"/>}
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <span className="tdisp" style={{fontSize:54}}>{fmt(time)}</span>
            <span style={{fontSize:10,color:'rgba(255,255,255,0.28)',fontWeight:600,marginTop:4,textTransform:'uppercase',letterSpacing:'1.5px'}}>
              {time===0?'Done!':running?'Focusing…':'Paused'}
            </span>
          </div>
        </div>

        <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap',marginBottom:28}}>
          <button className="btn btn-g btn-lg" onClick={()=>{setRunning(false);setDistract(false);}} style={{gap:8}}>
            <Ic d={I.pause} size={15}/> Pause
          </button>
          <button className="btn btn-s" onClick={markDone} style={{gap:7}}>
            <Ic d={I.check} size={14}/> Mark Done
          </button>
          <button className="btn btn-g btn-ic" style={{padding:'12px 14px'}} onClick={()=>{setRunning(false);setTime(TOTAL);setDistract(false);}}>
            <Ic d={I.reset} size={15}/>
          </button>
        </div>
        <div onClick={()=>{setDistract(false);setRunning(false);}}
          style={{fontSize:12,color:'rgba(255,255,255,0.18)',cursor:'pointer',transition:'color 0.2s'}}
          onMouseEnter={e=>e.currentTarget.style.color='rgba(255,255,255,0.45)'}
          onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.18)'}>
          ← Exit focus mode
        </div>
      </div>
    </div>
  );

  return(
    <div className="pg page-wrap" style={{padding:'80px 36px 40px',maxWidth:1020,margin:'0 auto',minHeight:'100vh'}}>
      <div style={{marginBottom:24}}>
        <h1 style={{fontSize:25,fontWeight:800,letterSpacing:'-0.4px',marginBottom:4}}>Focus Mode</h1>
        <p style={{color:'var(--txt2)',fontSize:13}}>Choose your task, set your timer, enter deep work.</p>
      </div>

      <div className="focus-grid" style={{display:'grid',gridTemplateColumns:'250px 1fr',gap:18,alignItems:'start'}}>
        {/* Task picker */}
        <div className="glass" style={{padding:16}}>
          <div style={{fontSize:10.5,fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'0.9px',marginBottom:12}}>Task Queue</div>
          {incomplete.length===0?(
            <div style={{textAlign:'center',padding:'20px 0',color:'var(--txt3)',fontSize:12}}>🎉 All tasks complete!</div>
          ):(
            <div className="stagger" style={{display:'flex',flexDirection:'column',gap:5}}>
              {incomplete.map(t=>{
                const isSel=selId===t.id;
                return(
                  <div key={t.id} onClick={()=>setSelId(t.id)}
                    className={isSel?'task-selected':''}
                    style={{padding:'10px 12px',borderRadius:12,cursor:'pointer',
                      border:`1px solid ${isSel?'rgba(108,99,255,0.5)':'var(--bdr)'}`,
                      background:isSel?'rgba(108,99,255,0.10)':'var(--surf)',
                      borderLeft:`3px solid ${PC[t.priority]}`,
                      transition:'all 0.22s var(--ease)',
                      transform:isSel?'translateX(4px) scale(1.01)':'translateX(0)'}}>
                    <div style={{fontSize:12,fontWeight:600,lineHeight:1.35,marginBottom:5}}>{t.title}</div>
                    <span className={`badge ${PB[t.priority]}`} style={{fontSize:9.5}}>{t.priority}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Timer card */}
        <div ref={timerRef} className="glass-hi card-3d" style={{padding:'36px 40px',display:'flex',flexDirection:'column',alignItems:'center',minHeight:500}}>
          {!task?(
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:40,color:'var(--txt2)'}}>
              <div style={{fontSize:38,marginBottom:14}}>🎯</div>
              <div style={{fontSize:14,fontWeight:500}}>Select a task to begin</div>
            </div>
          ):(
            <>
              <div style={{textAlign:'center',marginBottom:22,maxWidth:480}}>
                <div style={{fontSize:10,fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:7}}>Currently Focusing</div>
                <h2 style={{fontSize:20,fontWeight:800,lineHeight:1.4,marginBottom:9}}>{task.title}</h2>
                <span className={`badge ${PB[task.priority]}`}>{task.priority} Priority</span>
              </div>

              {/* ── TIMER PRESET PICKER ── */}
              <div style={{marginBottom:24,width:'100%',maxWidth:460}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:10,textAlign:'center'}}>
                  Session Duration
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center',marginBottom:8}}>
                  {TIMER_PRESETS.map(m=>(
                    <button key={m} className={`timer-preset${selectedPreset===m&&!showCustom?' active':''}`}
                      onClick={()=>setPreset(m)} disabled={running}>
                      {m}m
                    </button>
                  ))}
                  <button className={`timer-preset${showCustom?' active':''}`}
                    onClick={()=>setShowCustom(s=>!s)} disabled={running}
                    style={{gap:5,display:'flex',alignItems:'center'}}>
                    <Ic d={I.cust} size={12}/> Custom
                  </button>
                </div>
                {showCustom&&(
                  <div style={{display:'flex',gap:8,alignItems:'center',justifyContent:'center',animation:'stgIn 0.25s var(--ease)'}}>
                    <input type="number" min="1" max="180" value={customInput}
                      onChange={e=>setCustomInput(e.target.value)}
                      onKeyDown={e=>e.key==='Enter'&&applyCustom()}
                      className="inp" style={{width:80,textAlign:'center',padding:'8px 10px'}}
                      placeholder="Min"/>
                    <span style={{fontSize:12,color:'var(--txt3)'}}>minutes</span>
                    <button className="btn btn-p btn-sm" onClick={applyCustom}>Set</button>
                  </div>
                )}
                <div style={{textAlign:'center',fontSize:11,color:'var(--txt3)',marginTop:6}}>
                  Selected: <span style={{color:'var(--acc2)',fontWeight:700}}>{selectedPreset} min</span>
                  {running&&<span style={{marginLeft:8,color:'var(--yel)'}}>⚡ Running</span>}
                </div>
              </div>

              {/* SVG Timer ring */}
              <div style={{position:'relative',marginBottom:26}}>
                {/* Decorative rings */}
                <div style={{position:'absolute',inset:-20,borderRadius:'50%',border:'1px dashed rgba(108,99,255,0.20)',animation:'rwCW 18s linear infinite',pointerEvents:'none'}}/>
                <div style={{position:'absolute',inset:-10,borderRadius:'50%',border:'1px dashed rgba(108,99,255,0.12)',animation:'rwCCW 25s linear infinite',pointerEvents:'none'}}/>

                <svg width="220" height="220" viewBox="0 0 220 220">
                  {/* Track */}
                  <circle cx="110" cy="110" r={R} fill="none" stroke="rgba(108,99,255,0.08)" strokeWidth="12"/>
                  {/* Arc */}
                  <circle cx="110" cy="110" r={R} fill="none" stroke={progColor} strokeWidth="12"
                    strokeLinecap="round" strokeDasharray={CIRC} strokeDashoffset={CIRC*(1-pct)}
                    transform="rotate(-90 110 110)" className={running?'arc-running':''}
                    style={{transition:'stroke-dashoffset 1s linear, stroke 0.4s'}}/>
                  {/* Progress head dot */}
                  {pct>0.02&&pct<0.98&&(
                    <circle cx={110+R*Math.cos((pct*360-90)*Math.PI/180)} cy={110+R*Math.sin((pct*360-90)*Math.PI/180)}
                      r="6" fill={progColor} style={{filter:`drop-shadow(0 0 8px ${progColor})`}}/>
                  )}
                </svg>
                {justDone&&<div className="burst"/>}
                <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                  <span className="tdisp">{fmt(time)}</span>
                  <span style={{fontSize:10,color:'var(--txt3)',fontWeight:600,marginTop:5,textTransform:'uppercase',letterSpacing:'1.5px'}}>
                    {time===0?'✓ Done!':running?'Focusing…':'Ready'}
                  </span>
                </div>
              </div>

              {/* Controls */}
              <div style={{display:'flex',gap:9,flexWrap:'wrap',justifyContent:'center'}}>
                {!running?(
                  <button className="btn btn-p btn-lg" onClick={()=>{setRunning(true);setDistract(true);}} style={{gap:9}}>
                    <Ic d={I.play} size={15}/> Start Session
                  </button>
                ):(
                  <button className="btn btn-g btn-lg" onClick={()=>{setRunning(false);setDistract(false);}} style={{gap:9}}>
                    <Ic d={I.pause} size={15}/> Pause
                  </button>
                )}
                <button className="btn btn-g" onClick={()=>{setRunning(false);setTime(TOTAL);setDistract(false);}} title="Reset" style={{padding:'12px 14px'}}>
                  <Ic d={I.reset} size={16}/>
                </button>
                <button className="btn btn-s" onClick={markDone} style={{gap:7}}>
                  <Ic d={I.check} size={14}/> Mark Done
                </button>
              </div>

              {incomplete.filter(t=>t.id!==selId).length>0&&(
                <div style={{marginTop:14,fontSize:11.5,color:'var(--txt3)'}}>
                  {incomplete.filter(t=>t.id!==selId).length} more task(s) in queue
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   PROGRESS PAGE
══════════════════════════════════════════ */
function ProgressPage({tasks}){
  const done=tasks.filter(t=>t.done).length;
  const total=tasks.length;
  const pct=total?Math.round(done/total*100):0;
  const byP=['High','Medium','Low'].map(p=>({p,color:PC[p],done:tasks.filter(t=>t.priority===p&&t.done).length,total:tasks.filter(t=>t.priority===p).length}));
  const recent=[...tasks].filter(t=>t.done).reverse().slice(0,6);
  const maxBar=Math.max(...byP.map(b=>b.total),1);
  const msg=pct===100?'🎉 Perfect — all complete!':pct>=75?'🚀 Almost there!':pct>=50?'💪 Past halfway!':pct>=25?'📈 Building momentum!':'✨ Every task counts.';

  return(
    <div className="pg page-wrap" style={{padding:'80px 36px 40px',maxWidth:1020,margin:'0 auto',minHeight:'100vh'}}>
      <div style={{marginBottom:24}}>
        <h1 style={{fontSize:25,fontWeight:800,letterSpacing:'-0.4px',marginBottom:4}}>Progress Report</h1>
        <p style={{color:'var(--txt2)',fontSize:13}}>A clear view of your productivity at a glance.</p>
      </div>

      <div className="stat-grid stagger" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:18}}>
        {[
          {label:'Total Tasks',value:total,     color:'var(--acc2)',icon:'📋'},
          {label:'Completed',  value:done,       color:'var(--grn)', icon:'✅'},
          {label:'Remaining',  value:total-done, color:'var(--yel)', icon:'⏳'},
          {label:'Completion', value:`${pct}%`,  color:'var(--acc)', icon:'📊'},
        ].map(s=><StatCard key={s.label} s={s}/>)}
      </div>

      <div className="prog-grid" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div className="glass" style={{padding:22}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>{msg}</div>
          <div style={{fontSize:12,color:'var(--txt2)',marginBottom:18,lineHeight:1.5}}>{done} of {total} tasks complete</div>
          <div style={{position:'relative',marginBottom:8}}>
            <div className="ptrack" style={{height:12}}><div className="pfill" style={{width:`${pct}%`}}/></div>
            <div style={{position:'absolute',right:0,top:-26,fontSize:24,fontWeight:800,color:'var(--acc2)'}}>{pct}%</div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--txt3)'}}>
            <span>{done} done</span><span>{total-done} remaining</span>
          </div>
        </div>
        <div className="glass" style={{padding:22}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:18}}>Tasks by Priority</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:16,height:100,marginBottom:10}}>
            {byP.map(b=>{
              const h=Math.max((b.total/maxBar)*100,4);
              const dh=b.total?Math.max((b.done/maxBar)*100,0):0;
              return(
                <div key={b.p} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                  <div style={{fontSize:10,color:'var(--txt3)',fontWeight:600}}>{b.done}/{b.total}</div>
                  <div style={{width:'100%',height:`${h}px`,background:'rgba(108,99,255,0.07)',borderRadius:'5px 5px 0 0',position:'relative',overflow:'hidden',transform:'perspective(200px) rotateX(6deg)',transformOrigin:'bottom center'}}>
                    <div style={{position:'absolute',bottom:0,left:0,right:0,height:`${dh}px`,background:`linear-gradient(to top,${b.color},${b.color}88)`,borderRadius:'5px 5px 0 0',transition:'height 1s var(--ease)',boxShadow:`0 0 14px ${b.color}55`}}/>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{display:'flex',gap:14,justifyContent:'center'}}>
            {byP.map(b=>(
              <div key={b.p} style={{display:'flex',alignItems:'center',gap:5}}>
                <span style={{width:7,height:7,borderRadius:'50%',background:b.color,display:'inline-block',boxShadow:`0 0 5px ${b.color}`}}/>
                <span style={{fontSize:11,color:'var(--txt3)',fontWeight:600}}>{b.p}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="prog-grid" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="glass" style={{padding:22}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>By Priority</div>
          {byP.map(b=>{
            const p2=b.total?Math.round(b.done/b.total*100):0;
            return(
              <div key={b.p} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style={{fontSize:12,fontWeight:600,color:'var(--txt2)'}}>{b.p} Priority</span>
                  <span style={{fontSize:11,color:'var(--txt3)'}}>{b.done}/{b.total} — <span style={{color:b.color,fontWeight:700}}>{p2}%</span></span>
                </div>
                <div style={{height:7,background:'rgba(108,99,255,0.07)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${p2}%`,background:`linear-gradient(90deg,${b.color},${b.color}aa)`,borderRadius:3,transition:'width 1s var(--ease)',boxShadow:`0 0 10px ${b.color}55`}}/>
                </div>
              </div>
            );
          })}
        </div>
        <div className="glass" style={{padding:22}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Recently Completed</div>
          {recent.length===0?(
            <div style={{textAlign:'center',padding:'20px 0',color:'var(--txt3)',fontSize:12}}>Complete tasks to see them here</div>
          ):(
            <div className="stagger" style={{display:'flex',flexDirection:'column',gap:6}}>
              {recent.map(t=>(
                <div key={t.id}
                  style={{display:'flex',alignItems:'center',gap:9,padding:'9px 11px',
                    background:'var(--surf)',borderRadius:10,border:'1px solid var(--bdr)',
                    transition:'transform 0.18s var(--ease), border-color 0.18s'}}
                  onMouseEnter={e=>{e.currentTarget.style.transform='translateX(5px)';e.currentTarget.style.borderColor='var(--bdr2)';}}
                  onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.borderColor='';}}>
                  <Ic d={I.check} size={12} style={{color:'var(--grn)',flexShrink:0}}/>
                  <span style={{fontSize:12,flex:1,textDecoration:'line-through',color:'var(--txt2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</span>
                  <span style={{width:6,height:6,borderRadius:'50%',background:PC[t.priority],flexShrink:0,boxShadow:`0 0 6px ${PC[t.priority]}`}}/>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   PROFILE PAGE
══════════════════════════════════════════ */

    {icon:'🛡️',title:'Error Prevention',desc:'Confirm dialogs guard all destructive actions. (Nielsen #5)'},
    {icon:'⚡',title:'Aesthetic & Minimalist',desc:'Only essential elements per screen — zero visual noise. (Nielsen #8)'},
    {icon:'↩️',title:'User Control & Freedom',desc:'Edit, delete, pause, exit — every action reversible. (Nielsen #3)'},

            fontSize:30,fontWeight:800,color:'#fff',

            onMouseEnter={e=>e.currentTarget.style.transform='rotateY(18deg) rotateX(10deg) scale(1.08)'}
            onMouseLeave={e=>e.currentTarget.style.transform=''}>
            {user.name.charAt(0).toUpperCase()}
          </div>
          <div style={{flex:1}}>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:3,letterSpacing:'-0.3px'}}>{user.name}</h2>
            <div style={{fontSize:13,color:'var(--txt2)',marginBottom:9}}>{user.email}</div>
            <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
              <span className="chip">✦ Active Member</span>
              <span className="chip">Joined {joined}</span>
            </div>
          </div>
          <button className="btn btn-g btn-sm" onClick={onLogout} style={{gap:6,flexShrink:0}}>
            <Ic d={I.logout} size={13}/> Sign Out
          </button>
        </div>
      </div>

      <div className="stagger" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>
        {[
          {label:'Tasks Created',value:total,      icon:'📋',color:'var(--acc2)'},
          {label:'Tasks Done',   value:done,        icon:'🏆',color:'var(--grn)'},
          {label:'Focus Streak', value:`${streak}d`,icon:'🔥',color:'var(--yel)'},
        ].map(s=><StatCard key={s.label} s={s}/>)}
      </div>

      <div className="glass" style={{padding:22}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:16,display:'flex',alignItems:'center',gap:7}}>
          <Ic d={I.star} size={14}/> HCI Principles Applied
        </div>
        <div className="hci-grid stagger" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
          {hci.map(p=>(
            <div key={p.title}
              style={{padding:'13px 14px',background:'var(--surf)',borderRadius:12,border:'1px solid var(--bdr)',cursor:'default',transition:'all 0.22s var(--ease)'}}
              onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-4px) translateZ(8px)';e.currentTarget.style.borderColor='var(--bdr2)';e.currentTarget.style.boxShadow='0 10px 28px rgba(0,0,0,0.4)';}}
              onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.borderColor='';e.currentTarget.style.boxShadow='';}}>
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:5}}>
                <span style={{fontSize:15}}>{p.icon}</span>
                <span style={{fontSize:12,fontWeight:700,lineHeight:1.3}}>{p.title}</span>
              </div>
              <div style={{fontSize:11.5,color:'var(--txt2)',lineHeight:1.6}}>{p.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(()=>S.get('ff_user',null));
  const [page,setPage]=useState('dashboard');
  const [tasks,setTasks]=useState(()=>{const u=S.get('ff_user',null);return S.get(`ff_tasks_${u?.email||''}`,[]); });
  const [focusedId,setFocusedId]=useState(null);
  const [toastData,setToastData]=useState(null);
  const [theme,setTheme]=useState(()=>S.get('ff_theme','dark'));
  const toastKey=useRef(0);

  // Apply theme to HTML element
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    S.set('ff_theme',theme);
  },[theme]);

  // Persist tasks
  useEffect(()=>{if(user)S.set(`ff_tasks_${user.email}`,tasks);},[tasks,user]);

  // Cursor light + visibility
  useEffect(()=>{
    initCursorLight();
    const scene=document.getElementById('scene');
    const handleVis=()=>{if(scene)scene.style.animationPlayState=document.hidden?'paused':'running';};
    document.addEventListener('visibilitychange',handleVis);
    return()=>document.removeEventListener('visibilitychange',handleVis);
  },[]);

  const showToast=useCallback((msg,type='info')=>{toastKey.current++;setToastData({msg,type,k:toastKey.current});},[]);
  const toggleTheme=useCallback(()=>setTheme(t=>t==='dark'?'light':'dark'),[]);
  const handleLogin=useCallback(u=>{setUser(u);setTasks(S.get(`ff_tasks_${u.email}`,[]));setPage('dashboard');},[]);
  const handleLogout=useCallback(()=>{S.set('ff_user',null);setUser(null);setPage('dashboard');setFocusedId(null);},[]);
  const incompleteTasks=useMemo(()=>tasks.filter(t=>!t.done),[tasks]);

  if(!user)return(
    <>
      <LoginPage onLogin={handleLogin} theme={theme} toggleTheme={toggleTheme}/>
      {toastData&&<Toast key={toastData.k} msg={toastData.msg} type={toastData.type} onDone={()=>setToastData(null)}/>}
    </>
  );

  return(
    <>
      <Navbar page={page} setPage={setPage} user={user} onLogout={handleLogout}
        taskCount={incompleteTasks.length} theme={theme} toggleTheme={toggleTheme}/>
      <div style={{height:'100vh',overflowY:'auto',position:'relative',zIndex:1}}>
        {page==='dashboard'&&<DashboardPage tasks={tasks} setTasks={setTasks} focusedId={focusedId} setFocusedId={setFocusedId} user={user} setPage={setPage} showToast={showToast}/>}
        {page==='focus'    &&<FocusPage     tasks={tasks} setTasks={setTasks} focusedId={focusedId} setFocusedId={setFocusedId} showToast={showToast}/>}
        {page==='progress' &&<ProgressPage  tasks={tasks}/>}
        {page==='profile'  &&<ProfilePage   user={user} tasks={tasks} onLogout={handleLogout}/>}
      </div>
      {toastData&&<Toast key={toastData.k} msg={toastData.msg} type={toastData.type} onDone={()=>setToastData(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
